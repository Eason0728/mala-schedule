<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
/* file:// 無法連雲端同步 → 自動導向線上版（帶上同步設定） */
if(location.protocol==='file:'){
  var _u='https://eason0728.github.io/mala-schedule/';
  try{
    var _c=JSON.parse(localStorage.getItem('mala_gist_cfg')||'null');
    if(_c&&_c.gistId&&_c.token) _u+='#gist='+_c.gistId+'&token='+encodeURIComponent(_c.token);
  }catch(e){}
  location.replace(_u);
}
</script>
<title>麻的🔥小辛辣 排班系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#e74c3c;--red-dark:#c0392b;--bg:#f5f5f5;--white:#fff;
  --border:#ddd;--text:#333;--gray:#888;--green:#27ae60;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:8px 0 6px;text-align:center;cursor:pointer;color:var(--gray);border:none;background:none;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .ico{font-size:22px}
.nav-btn.active{color:var(--red)}
/* PAGES */
.page{display:none;padding-bottom:70px}
.page.active{display:block}
/* HEADER */
.hdr{background:var(--red);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr h1{font-size:17px;font-weight:700}
.hdr-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
/* LOGO BAR */
.logo-bar{background:#fff;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:59px;z-index:40}
.month-nav .mnav-btn{background:none;border:1px solid var(--border);width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav .month-label{font-size:18px;font-weight:700}
/* SCHEDULE TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sch-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap}
.sch-tbl th,.sch-tbl td{border:1px solid #ccc;padding:6px 5px;text-align:center;min-width:34px}
.sch-tbl .sticky-col{position:sticky;left:0;z-index:5;background:#fff;min-width:118px;max-width:118px;text-align:left;padding:8px 10px;font-weight:600;font-size:13px}
.emp-cell-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-cell-sub{font-size:10px;color:var(--gray);line-height:1.7;font-weight:400}
.emp-cell-leave{font-size:10px;color:#27ae60;font-weight:600;line-height:1.7}
.emp-cell-req{font-size:10px;color:#e67e22;font-weight:600;line-height:1.7}
.sch-tbl .hdr-row th{background:#f0f0f0;font-weight:600;font-size:11px;position:sticky;top:0;z-index:10;padding:6px 4px;line-height:1.4}
.sch-tbl .hdr-row .sticky-col{z-index:15;background:#f0f0f0}
.day-sat,.day-sun,.day-hol{color:#e74c3c}
.shift-cell{cursor:pointer;border-radius:2px;font-weight:600;min-width:34px;height:38px;line-height:38px;font-size:13px}
.shift-cell:active{opacity:0.7}
/* 指定休假：紅色斜線 */
.diag-off{background-image:linear-gradient(to top right,transparent calc(50% - 1px),#e74c3c calc(50% - 1px),#e74c3c calc(50% + 1px),transparent calc(50% + 1px))}
/* SHIFT COLORS */
.s-A{background:#FFE066}
.s-B{background:#FFD700}
.s-C{background:#90EE90}
.s-C2{background:#7FD9A0}
.s-D{background:#87CEEB}
.s-D1{background:#ADD8E6}
.s-E{background:#DDA0DD}
.s-F{background:#FFA07A;color:#c0392b}
.s-H{background:#FFB6C1}
.s-休{background:#f5f5f5;color:#aaa}
.s-國{background:#ff7675;color:#fff}
.s-空{background:#fff;color:#ccc}
/* STAT BAR */
.stat-bar{display:flex;overflow-x:auto;padding:8px 12px;gap:8px;background:#fff;border-bottom:1px solid var(--border)}
.stat-chip{flex:0 0 auto;background:#f9f9f9;border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center;min-width:70px}
.stat-chip .sv{font-size:16px;font-weight:700;color:var(--red)}
.stat-chip .sl{font-size:10px;color:var(--gray)}
/* CARDS */
.card{background:#fff;border-radius:10px;margin:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* EMP LIST */
.emp-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.emp-item:last-child{border-bottom:none}
.emp-avatar{width:40px;height:40px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.emp-info{flex:1;margin:0 12px}
.emp-info .name{font-size:15px;font-weight:600}
.emp-info .sub{font-size:12px;color:var(--gray);margin-top:2px}
.emp-actions{display:flex;gap:8px}
/* SALARY */
.sal-item{padding:14px 0;border-bottom:1px solid var(--border)}
.sal-item:last-child{border-bottom:none}
.sal-name{font-size:15px;font-weight:600;margin-bottom:6px}
.sal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.sal-tag{font-size:11px;background:#f5f5f5;padding:3px 8px;border-radius:20px;color:var(--gray)}
.sal-total{font-size:18px;font-weight:700;color:var(--green)}
.sal-deduct{font-size:12px;color:#e74c3c;margin-top:2px}
/* BUTTONS */
.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:500}
.btn-primary{background:var(--red);color:#fff}
.btn-outline{background:#fff;color:var(--red);border:1px solid var(--red)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:#fff;color:#e74c3c;border:1px solid #e74c3c}
.btn-ghost{background:#f5f5f5;color:var(--text);border:none}
.fab{position:fixed;bottom:80px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--red);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(231,76,60,.4);display:flex;align-items:center;justify-content:center;z-index:90}
/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:92vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-hdr h2{font-size:18px;font-weight:700}
.modal-close{font-size:24px;cursor:pointer;color:var(--gray);background:none;border:none;padding:0 4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--gray);margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--red)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
/* SHIFT PICKER */
.shift-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:8px 0}
.sp-btn{padding:10px 4px;border-radius:8px;border:2px solid transparent;cursor:pointer;font-size:13px;font-weight:700;text-align:center;transition:.15s}
.sp-btn.selected{border-color:var(--red);box-shadow:0 0 0 1px var(--red)}
.sp-btn:active{transform:scale(.95)}
/* SETTINGS */
.shift-def-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.shift-badge{width:36px;height:28px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
/* TOAST */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* DIVIDER */
.section-title{padding:12px 16px 4px;font-size:12px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
/* SUMMARY ROW */
.count-row td{background:#fff9e6;font-weight:600}
/* GROUP HEADER (正職/計時) */
.grp-row td{font-weight:700;font-size:11px;padding:3px 6px;border-top:2px solid #aaa}
.grp-row .sticky-col{font-weight:700}
/* ANNOTATION ROW */
.note-row td{background:#fffbe6;font-size:9px;color:#b8860b;font-weight:600;cursor:pointer;line-height:1.2;padding:2px 1px}
.note-row .sticky-col{background:#fffbe6}
.note-hol{color:#e74c3c}
/* AUTO-SCHEDULE */
.auto-day-btn{width:30px;height:30px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:#333;padding:0}
.auto-day-btn.red-day{border-color:#e74c3c;color:#e74c3c}
.auto-day-btn.selected{background:#e74c3c;color:#fff;border-color:#e74c3c}
/* DELIVERY ROWS */
.deliv-lunch td{background:#eaf7ee;font-size:10px;font-weight:600;cursor:pointer}
.deliv-lunch .sticky-col{background:#eaf7ee;color:#1d9e75}
.deliv-dinner td{background:#e8eefc;font-size:10px;font-weight:600;cursor:pointer}
.deliv-dinner .sticky-col{background:#e8eefc;color:#3a5fcd}
.deliv-cell:active{opacity:.6}
</style>
</head>
<body>

<!-- ===== PAGES ===== -->
<!-- 班表 -->
<div id="page-schedule" class="page active">
  <div class="logo-bar">
    <div style="display:flex;align-items:center;gap:6px">
      <img id="logo-img" src="logo.png" alt="logo" style="height:42px" onerror="this.style.display='none';document.getElementById('logo-text').style.display='flex'">
      <div id="logo-text" style="display:none;flex-direction:column;line-height:1.05">
        <span style="font-size:21px;font-weight:900;color:#111;letter-spacing:1px">麻的🔥小辛辣</span>
        <span style="font-size:9px;color:#c0392b;letter-spacing:2px;font-weight:600">MADE · SIAO SIN-LA</span>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="hdr-btn" style="background:#8e44ad;color:#fff" onclick="openAutoSchedule()">✨ 自動排班</button>
      <button class="hdr-btn" style="background:var(--red);color:#fff" onclick="exportPDF()">📄 匯出</button>
    </div>
  </div>
  <div class="month-nav">
    <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
    <div style="text-align:center">
      <div class="month-label" id="month-label"></div>
      <div id="store-label" style="font-size:12px;color:var(--gray);cursor:pointer;margin-top:2px" onclick="editStore()"></div>
    </div>
    <button class="mnav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div style="display:flex;gap:8px;padding:6px 12px;background:#fff;border-bottom:1px solid var(--border)">
    <button class="btn btn-danger btn-sm" style="flex:1" onclick="clearDayShifts()">🗑 清除指定日期</button>
    <button class="btn btn-danger btn-sm" style="flex:1" onclick="clearMonthShifts()">🗑 清除當月</button>
  </div>
  <div class="stat-bar" id="stat-bar"></div>
  <div id="shift-legend" style="display:flex;overflow-x:auto;padding:6px 12px;gap:6px;background:#fafafa;border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch"></div>
  <div class="tbl-wrap">
    <table class="sch-tbl" id="sch-table"></table>
  </div>
  <div id="sch-summary"></div>
</div>

<!-- 員工 -->
<div id="page-employees" class="page">
  <div class="hdr"><h1>👥 員工管理</h1></div>
  <div class="card" id="emp-list"></div>
  <button class="fab" onclick="openEmpModal()">＋</button>
</div>

<!-- 薪資 -->
<div id="page-salary" class="page">
  <div class="hdr">
    <h1>💰 薪資計算</h1>
    <button class="hdr-btn" onclick="exportSalaryPDF()">📄 匯出</button>
  </div>
  <div class="month-nav">
    <button class="mnav-btn" onclick="changeSalMonth(-1)">‹</button>
    <span class="month-label" id="sal-month-label"></span>
    <button class="mnav-btn" onclick="changeSalMonth(1)">›</button>
  </div>
  <div id="salary-content"></div>
</div>

<!-- 設定 -->
<div id="page-settings" class="page">
  <div class="hdr"><h1>⚙️ 設定</h1></div>
  <div class="section-title">班別定義</div>
  <div class="card" id="shift-defs"></div>
  <div class="section-title">加班費規則（台灣勞基法）</div>
  <div class="card">
    <div class="form-group"><label>正常工時（小時/日）</label><input type="number" id="set-regular-hours" value="8" min="1" max="12" onchange="saveSetting('regularHours',this.value)"></div>
    <div class="form-row">
      <div class="form-group"><label>前2小時加班倍率</label><input type="number" id="set-ot1" step="0.01" value="1.33" onchange="saveSetting('ot1',this.value)"></div>
      <div class="form-group"><label>超過2小時倍率</label><input type="number" id="set-ot2" step="0.01" value="1.67" onchange="saveSetting('ot2',this.value)"></div>
    </div>
    <div class="section-title" style="padding:8px 0 4px;font-size:11px">國定假日加班</div>
    <div class="form-group"><label>國定假日倍率</label><input type="number" id="set-hol" step="0.01" value="2.00" onchange="saveSetting('holRate',this.value)"></div>
  </div>
  <div class="section-title">☁️ 雲端同步</div>
  <div class="card" id="gist-setting-card">
    <div id="gist-status" style="font-size:13px;margin-bottom:12px;color:var(--gray)">⚫ 未連線</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary" style="flex:1" onclick="pullFromGist()">⬇ 立即同步</button>
      <button class="btn btn-ghost" onclick="pushToGist(true)">⬆ 上傳</button>
      <button class="btn btn-danger btn-sm" onclick="disconnectGist()">斷線</button>
    </div>
    <div style="margin-top:12px;padding:10px;background:#f9f9f9;border-radius:8px;font-size:12px;color:var(--gray);line-height:1.8" id="gist-setup-hint">
      掃描下方 QR code 在手機上設定同步
    </div>
    <div id="gist-qr" style="text-align:center;margin-top:10px"></div>
  </div>

  <div class="section-title">✨ 自動排班規則</div>
  <div class="card" id="auto-rules-list"></div>

  <div class="section-title">📋 每日班別需求</div>
  <div class="card" id="day-req-card"></div>

  <div class="section-title">關於</div>
  <div class="card" style="color:var(--gray);font-size:13px;line-height:1.8">
    <p>麻的🔥小辛辣 排班系統 v1.0</p>
    <button class="btn btn-danger btn-sm" style="margin-top:12px" onclick="clearAllData()">清除所有資料</button>
  </div>
</div>

<!-- ===== BOTTOM NAV ===== -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('schedule',this)"><span class="ico">📅</span>班表</button>
  <button class="nav-btn" onclick="showPage('employees',this)"><span class="ico">👥</span>員工</button>
  <button class="nav-btn" onclick="showPage('salary',this)"><span class="ico">💰</span>薪資</button>
  <button class="nav-btn" onclick="showPage('settings',this)"><span class="ico">⚙️</span>設定</button>
</nav>

<!-- ===== MODALS ===== -->
<!-- 員工 Modal -->
<div class="overlay" id="emp-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="emp-modal-title">新增員工</h2>
      <button class="modal-close" onclick="closeModal('emp-overlay')">✕</button>
    </div>
    <input type="hidden" id="emp-id">
    <div class="form-row">
      <div class="form-group"><label>姓名 *</label><input type="text" id="emp-name" placeholder="張小明"></div>
      <div class="form-group"><label>到職日 *</label><input type="date" id="emp-hire"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>聯絡電話</label><input type="tel" id="emp-phone" placeholder="0912345678"></div>
      <div class="form-group"><label>生日</label><input type="date" id="emp-birthday"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>時薪（元）*</label><input type="number" id="emp-wage" placeholder="183" min="0"></div>
      <div class="form-group"><label>底薪（元）</label><input type="number" id="emp-base" placeholder="0" min="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>保險自負額</label><input type="number" id="emp-ins" placeholder="0" min="0"></div>
      <div class="form-group"><label>宿舍費</label><input type="number" id="emp-dorm" placeholder="0" min="0"></div>
    </div>
    <div class="form-group"><label>特休額度（天，留空依到職自動計算）</label><input type="number" id="emp-leave" min="0" step="0.5" placeholder="自動"></div>
    <div class="section-title" style="padding:4px 0">津貼／獎金（每月固定加給）</div>
    <div class="form-row">
      <div class="form-group"><label>加班費（元/時）</label><input type="number" id="emp-otrate" min="0" placeholder="留空依勞基法"></div>
      <div class="form-group"><label>職能津貼</label><input type="number" id="emp-skill" placeholder="0" min="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>全勤獎金</label><input type="number" id="emp-attend" placeholder="0" min="0"></div>
      <div class="form-group"><label>夜間津貼</label><input type="number" id="emp-night" placeholder="0" min="0"></div>
    </div>
    <div class="form-group"><label>店長津貼</label><input type="number" id="emp-mgr" placeholder="0" min="0"></div>
    <div class="form-group">
      <label><input type="checkbox" id="emp-fulltime" style="width:auto;margin-right:6px">正職員工（顯示當月應出勤時數）</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('emp-overlay')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEmployee()">儲存</button>
    </div>
  </div>
</div>

<!-- 班別 Picker -->
<div class="overlay" id="shift-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="shift-modal-title">選擇班別</h2>
      <button class="modal-close" onclick="closeModal('shift-overlay')">✕</button>
    </div>
    <div class="shift-grid" id="shift-picker-grid"></div>
    <div style="margin-top:8px;padding:8px;background:#f9f9f9;border-radius:8px;font-size:12px;color:var(--gray);text-align:center" id="shift-info-box"></div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('shift-overlay')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="applyShift()">確定</button>
    </div>
  </div>
</div>

<!-- 班別設定 Modal -->
<div class="overlay" id="shiftdef-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="shiftdef-title">編輯班別</h2>
      <button class="modal-close" onclick="closeModal('shiftdef-overlay')">✕</button>
    </div>
    <input type="hidden" id="sd-code">
    <div class="form-row">
      <div class="form-group"><label>班別代碼</label><input type="text" id="sd-name" placeholder="A" maxlength="3"></div>
      <div class="form-group"><label>工時（小時）</label><input type="number" id="sd-hours" step="0.5" min="0" max="24"></div>
    </div>
    <div class="form-group"><label>時間說明</label><input type="text" id="sd-time" placeholder="15:00～23:30"></div>
    <div class="form-row">
      <div class="form-group"><label>背景色</label><input type="color" id="sd-color" value="#FFE066"></div>
      <div class="form-group"><label>文字色</label><input type="color" id="sd-textcolor" value="#333333"></div>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="sd-isoff" style="width:auto;margin-right:6px">這是休假/不計工時</label>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('shiftdef-overlay')">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveShiftDef()">儲存</button>
    </div>
  </div>
</div>

<!-- 自動排班 Modal -->
<div class="overlay" id="auto-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2>✨ 自動排班</h2>
      <button class="modal-close" onclick="closeModal('auto-overlay')">✕</button>
    </div>
    <div id="auto-modal-body"></div>

      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('auto-overlay')">取消</button>
      <button class="btn btn-primary" style="flex:1;background:#8e44ad" onclick="runAutoSchedule()">生成班表</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== DEFAULT DATA =====
const DEFAULT_SHIFTS = {
  A:  {name:'A班', time:'15:00～23:30', hours:8.5, breakH:0.5, color:'#FFE066', textColor:'#333', isOff:false},
  B:  {name:'B班', time:'16:00～23:30', hours:7.5, breakH:0,   color:'#FFD700', textColor:'#333', isOff:false},
  C:  {name:'C班', time:'17:00～22:30', hours:5.5, breakH:0,   color:'#90EE90', textColor:'#333', isOff:false},
  C2: {name:'C2班',time:'17:30～23:30', hours:6.0, breakH:0,   color:'#7FD9A0', textColor:'#333', isOff:false},
  D:  {name:'D班', time:'18:00～22:30', hours:4.5, breakH:0,   color:'#87CEEB', textColor:'#333', isOff:false},
  D1: {name:'D1班',time:'18:30～22:30', hours:4.0, breakH:0,   color:'#ADD8E6', textColor:'#333', isOff:false},
  E:  {name:'E班', time:'09:00～17:30', hours:8.5, breakH:0.5, color:'#DDA0DD', textColor:'#333', isOff:false},
  F:  {name:'F班', time:'11:00～14:00\n17:30～22:30', hours:8.0, breakH:0, color:'#FFA07A', textColor:'#c0392b', isOff:false},
  H1: {name:'H1班', time:'11:00～14:00\n17:00～22:00', hours:8.0, breakH:0, color:'#FFB6C1', textColor:'#333', isOff:false},
  '休': {name:'休假', time:'－', hours:0, breakH:0, color:'#f5f5f5', textColor:'#aaa', isOff:true},
  '特': {name:'特休', time:'特休假', hours:0, breakH:0, color:'#E8D5FF', textColor:'#7B2FBE', isOff:true},
  '指': {name:'指定休', time:'指定休假', hours:0, breakH:0, color:'#ffecec', textColor:'#e74c3c', isOff:true},
  '國': {name:'國定假日', time:'國定假日', hours:0, breakH:0, color:'#ffe0e0', textColor:'#e74c3c', isOff:false},
};
// 每月預估營業額（圖片提供 5-12 月）；可於班表下方點擊修改
const DEFAULT_REVENUE={2026:{5:1350000,6:1310000,7:1340000,8:1350000,9:1120000,10:1330000,11:1300000,12:1350000}};

// ===== STATE =====
let state = {
  curYear: new Date().getFullYear(),
  curMonth: new Date().getMonth()+1,
  salYear: new Date().getFullYear(),
  salMonth: new Date().getMonth()+1,
  pendingCell: null,
  pendingShift: null,
};

// ===== STORAGE (localStorage + GitHub Gist sync) =====
let _suppressPush=false;   // true while we write data programmatically (pull/init) so we never echo-push
let _synced=false;         // becomes true after first successful cloud pull
function load(key, def){ try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;} }
function save(key,val){ localStorage.setItem(key,JSON.stringify(val)); if(!_suppressPush) scheduleGistPush(); }

function getEmployees(){ return load('mala_employees',[]); }
function saveEmployees(d){ save('mala_employees',d); }
function getShifts(){ const m={...DEFAULT_SHIFTS,...load('mala_shifts',{})}; load('mala_hidden_shifts',[]).forEach(c=>delete m[c]); return m; }
// 班別排序：英文字母班別依字母/數字順序，休假類（休特指國）固定排最後
function sortedShiftEntries(shifts){
  const isWork=c=>/^[A-Za-z]/.test(c);
  const restOrder=['休','特','指','國'];
  const work=Object.entries(shifts).filter(([c])=>isWork(c)).sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}));
  const rest=Object.entries(shifts).filter(([c])=>!isWork(c)).sort((a,b)=>{
    const ai=restOrder.indexOf(a[0]), bi=restOrder.indexOf(b[0]);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  return [...work,...rest];
}
function saveShifts(d){ save('mala_shifts',d); }
function getSchedule(y,m){ return load(`mala_sch_${y}_${m}`,{}); }
function saveSchedule(y,m,d){ save(`mala_sch_${y}_${m}`,d); }
function getSettings(){ return {...{regularHours:8,ot1:1.33,ot2:1.67,holRate:2.0},...load('mala_settings',{})}; }
function saveSetting(k,v){ const s=getSettings();s[k]=parseFloat(v)||v;save('mala_settings',s); }
function getHolidays(y,m){ return load(`mala_hol_${y}_${m}`,[]); }
function saveHolidays(y,m,d){ save(`mala_hol_${y}_${m}`,d); }
function getNotes(y,m){ return load(`mala_notes_${y}_${m}`,{}); }
function saveNotes(y,m,d){ save(`mala_notes_${y}_${m}`,d); }
function getDelivery(y,m){ return load(`mala_deliv_${y}_${m}`,{lunch:{},dinner:{}}); }
function saveDelivery(y,m,d){ save(`mala_deliv_${y}_${m}`,d); }
function getRevenue(y,m){ const v=load(`mala_rev_${y}_${m}`,null); return v!==null?v:((DEFAULT_REVENUE[y]||{})[m]||0); }
function saveRevenue(y,m,v){ save(`mala_rev_${y}_${m}`,v); }
function getStore(){ return load('mala_store',''); }

// ===== GITHUB GIST SYNC =====
function getGistCfg(){ try{return JSON.parse(localStorage.getItem('mala_gist_cfg')||'null');}catch{return null;} }
function saveGistCfg(cfg){ localStorage.setItem('mala_gist_cfg', JSON.stringify(cfg)); }

// Collect all mala_ keys into one JSON snapshot
function buildSnapshot(){
  const snap={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('mala_')&&k!=='mala_gist_cfg'){
      try{snap[k]=JSON.parse(localStorage.getItem(k));}catch{}
    }
  }
  return snap;
}

// Debounced push (wait 2s after last change)
let _pushTimer=null;
function scheduleGistPush(){
  const cfg=getGistCfg();
  if(!cfg) return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>pushToGist(false), 2000);
}

async function pushToGist(showMsg=true){
  const cfg=getGistCfg();
  if(!cfg) return;
  try{
    const body=JSON.stringify({"mala-schedule.json":{content:JSON.stringify(buildSnapshot(),null,2)}});
    const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      method:'PATCH',
      headers:{'Authorization':'Bearer '+cfg.token,'Content-Type':'application/json'},
      body:JSON.stringify({files:{"mala-schedule.json":{content:JSON.stringify(buildSnapshot(),null,2)}}})
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    if(showMsg) showToast('✅ 已同步到雲端');
  }catch(e){ if(showMsg) showToast('⚠️ 同步失敗：'+e.message); }
}

async function pullFromGist(silent){
  const cfg=getGistCfg();
  if(!cfg){ if(!silent) showToast('請先設定 Gist 同步'); return; }
  // Never clobber unsaved local edits: if a push is pending, skip this pull
  if(_pushTimer){ return; }
  if(!silent) showToast('同步中...', 2000);
  try{
    const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      headers:{'Authorization':'Bearer '+cfg.token},
      cache:'no-store'
    });
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const content=data.files?.['mala-schedule.json']?.content;
    if(!content) return;
    const snap=JSON.parse(content);
    if(snap._init) return;
    _suppressPush=true;
    Object.entries(snap).forEach(([k,v])=>{
      localStorage.setItem(k, JSON.stringify(v));
    });
    _suppressPush=false;
    _synced=true;
    renderSchedule(); renderEmployees(); renderSalary();
    if(!silent) showToast('✅ 已從雲端同步');
  }catch(e){ _suppressPush=false; if(!silent) showToast('⚠️ 同步失敗：'+e.message); }
}

// Polling wrapper: skip if local edits are pending (handled inside pullFromGist too)
function startGistPolling(){ setInterval(()=>pullFromGist(true), 30000); }

// ===== HELPERS =====
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function weekday(y,m,d){ return new Date(y,m-1,d).getDay(); } // 0=Sun
function wd(n){ return ['日','一','二','三','四','五','六'][n]; }
function fmt(n){ return String(n).padStart(2,'0'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function monthKey(y,m){ return `${y}-${fmt(m)}`; }

// 某月該顯示哪些員工：在職者永遠顯示；離職者只在「離職月(含)以前且該月有排班」的月份顯示
function getEmployeesForMonth(y,m){
  const sch=getSchedule(y,m);
  const mk=monthKey(y,m);
  return getEmployees().filter(e=>{
    if(e.active!==false) return true;                            // 在職
    if(e.termMonth && mk>e.termMonth) return false;              // 離職之後的月份 → 隱藏
    const es=sch[e.id]; return es && Object.keys(es).length>0;   // 其餘月份：有排班才保留
  });
}

function showToast(msg,ms=2000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

function showPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='schedule') renderSchedule();
  if(name==='employees') renderEmployees();
  if(name==='salary') renderSalary();
  if(name==='settings') renderSettings();
}

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

// ===== SCHEDULE PAGE =====
function clearDayShifts(){
  const y=state.curYear, m=state.curMonth;
  const total=daysInMonth(y,m);
  const input=prompt(`清除哪一天所有人的班別？\n請輸入日期（1～${total}）`);
  if(input===null) return;
  const day=parseInt(input);
  if(!day||day<1||day>total){showToast('日期無效');return;}
  if(!confirm(`確定清除 ${m}月${day}日 所有人的班別？`)) return;
  const sch=getSchedule(y,m);
  getEmployeesForMonth(y,m).forEach(emp=>{ if(sch[emp.id]) delete sch[emp.id][day]; });
  saveSchedule(y,m,sch);
  renderSchedule();
  showToast(`已清除 ${m}/${day} 所有班別`);
}

function clearMonthShifts(){
  const y=state.curYear, m=state.curMonth;
  if(!confirm(`確定清除 ${y}年${m}月 所有人的班別？此操作無法復原！`)) return;
  saveSchedule(y,m,{});
  renderSchedule();
  showToast('已清除當月所有班別');
}

function changeMonth(d){
  state.curMonth+=d;
  if(state.curMonth>12){state.curMonth=1;state.curYear++;}
  if(state.curMonth<1){state.curMonth=12;state.curYear--;}
  renderSchedule();
}

function renderSchedule(){
  const y=state.curYear, m=state.curMonth;
  document.getElementById('month-label').textContent=`${y} 年 ${m} 月`;
  const st=getStore();
  document.getElementById('store-label').textContent = st?`店別：${st}`:'＋ 設定店別';
  const days=daysInMonth(y,m);
  const emps=getEmployeesForMonth(y,m);
  const sch=getSchedule(y,m);
  const shifts=getShifts();
  const holidays=getHolidays(y,m);

  // Stat bar + legend
  renderStatBar(y,m,emps,sch,shifts,holidays);
  renderShiftLegend(shifts);

  // Table
  const tbl=document.getElementById('sch-table');
  let html='<thead><tr class="hdr-row"><th class="sticky-col" style="font-size:10px">員工／到職</th>';
  for(let d=1;d<=days;d++){
    const wk=weekday(y,m,d);
    const isHol=holidays.includes(d);
    const cls=isHol||wk===0||wk===6?'day-sun':'';
    html+=`<th class="${cls}">${d}<br><span>${wd(wk)}</span></th>`;
  }
  html+='<th>天數</th><th>時數</th></tr></thead><tbody>';

  // 提醒/節日 annotation row
  const notes=getNotes(y,m);
  html+='<tr class="note-row"><td class="sticky-col">提醒</td>';
  for(let d=1;d<=days;d++){
    const lbl=dayAnnotation(y,m,d,holidays,notes);
    const isHol=holidays.includes(d);
    html+=`<td class="${isHol?'note-hol':''}" onclick="editNote(${d})">${lbl||'　'}</td>`;
  }
  html+='<td></td><td></td></tr>';

  // 外送 rows（緊接在提醒列下方）
  const deliv=getDelivery(y,m);
  let lunchCnt=0, dinnerCnt=0;
  html+='<tr class="deliv-lunch"><td class="sticky-col">午餐外送</td>';
  for(let d=1;d<=days;d++){
    const v=deliv.lunch?.[d]||'';
    if(v) lunchCnt++;
    html+=`<td class="deliv-cell" onclick="editDelivery('lunch',${d})">${v||'　'}</td>`;
  }
  html+=`<td style="font-weight:700;color:#1d9e75">${lunchCnt}</td><td></td></tr>`;
  html+='<tr class="deliv-dinner"><td class="sticky-col">晚餐外送</td>';
  for(let d=1;d<=days;d++){
    const v=deliv.dinner?.[d]||'';
    if(v) dinnerCnt++;
    html+=`<td class="deliv-cell" onclick="editDelivery('dinner',${d})">${v||'　'}</td>`;
  }
  html+=`<td style="font-weight:700;color:#3a5fcd">${dinnerCnt}</td><td></td></tr>`;

  const renderEmpRow=(emp)=>{
    const empSch=sch[emp.id]||{};
    const hasAnyShift=Object.keys(empSch).length>0;  // 此人本月是否已開始排班
    let restDays=0, totalH=0;
    const hireStr=emp.hireDate?emp.hireDate.slice(0,7).replace('-','/'):'';
    const entitle=emp.isFullTime?(emp.leaveQuota>0?emp.leaveQuota:calcLeaveEntitlement(emp.hireDate)):0;
    const used=calcLeaveUsed(emp.id, y);
    const remain=Math.max(entitle-used,0);
    const reqH=emp.isFullTime?calcRequiredHours(y,m):null;
    let row=`<tr><td class="sticky-col">
      <div class="emp-cell-name">${emp.name}</div>
      <div class="emp-cell-sub">到職 ${hireStr}</div>
      ${emp.isFullTime?`<div class="emp-cell-leave">特休剩 ${remain}天</div><div class="emp-cell-req">應出 ${reqH}h</div>`:''}
    </td>`;
    for(let d=1;d<=days;d++){
      let code=empSch[d]||'';
      // 計時人員：已開始排班後，空白日才視為休（未排班前保持空白）
      if(!code && !emp.isFullTime && hasAnyShift) code='休';
      const sh=shifts[code];
      const wk=weekday(y,m,d), isHol=holidays.includes(d);
      const colBg = isHol?'#fdeaea':((wk===0||wk===6)?'#f0f0f0':'#fff'); // 六日/國定假日淺色網底
      const isWorking = sh && !sh.isOff && code!=='國';
      const isRest = (sh && sh.isOff) || code==='國';
      let bg=colBg, tc='#ccc', cls='shift-cell', disp=code||'　';
      if(sh){
        if(isWorking){ tc='#000'; }                          // 班別：無網底、黑字（六日仍套用欄位網底）
        else { bg=sh.color; tc='#e74c3c'; }                  // 休假類（休/特/指/國）：保留網底、紅字
      }
      if(isWorking){ totalH+=calcWorkHours(sh); }
      if(isRest){ restDays++; }
      const isBirthday=emp.birthday&&emp.birthday.slice(5)===`${fmt(m)}-${fmt(d)}`;
      if(isBirthday) bg='#FFB3C1';
      row+=`<td class="${cls}" style="background:${bg};color:${tc}" onclick="openShiftPicker('${emp.id}',${d})">${isBirthday?'🎂':''}${disp}</td>`;
    }
    row+=`<td style="background:#fdeaea;font-weight:600;color:#e74c3c">${restDays}</td><td style="background:#f9f9f9">${totalH.toFixed(1)}</td></tr>`;
    return row;
  };
  // 分組：正職人員在上、計時人員在下，各自加上色塊標題列
  const groups=[
    ['正職人員', emps.filter(e=>e.isFullTime),  '#c0392b', '#fdecea'],
    ['計時人員', emps.filter(e=>!e.isFullTime), '#1f6aa5', '#e8f1fb'],
  ];
  groups.forEach(([label,list,fg,bg])=>{
    if(!list.length) return;
    html+=`<tr class="grp-row"><td class="sticky-col" style="background:${bg};color:${fg}">${label}（${list.length}）</td>`;
    for(let d=1;d<=days;d++) html+=`<td style="background:${bg}"></td>`;
    html+=`<td style="background:${bg}"></td><td style="background:${bg}"></td></tr>`;
    list.forEach(emp=>{ html+=renderEmpRow(emp); });
  });

  // 每日人數
  html+='<tr class="count-row"><td class="sticky-col" style="background:#fff9e6">人數</td>';
  let totalCount=0;
  for(let d=1;d<=days;d++){
    let cnt=0;
    emps.forEach(emp=>{
      const code=(sch[emp.id]||{})[d]||'';
      const sh=shifts[code];
      if(sh&&!sh.isOff&&code&&code!=='國') cnt++;
    });
    totalCount+=cnt;
    html+=`<td style="background:#fff9e6;font-weight:600">${cnt||''}</td>`;
  }
  html+=`<td style="background:#fff9e6;font-weight:600">${(totalCount/days).toFixed(1)}</td><td></td></tr>`;

  html+='</tbody>';
  tbl.innerHTML=html;

  renderSummary(y,m,lunchCnt,dinnerCnt);
}

function calcLaborCost(y,m){
  let total=0;
  getEmployeesForMonth(y,m).forEach(e=>{ const r=calcSalary(e.id,y,m); if(r) total+=r.grossPay; });
  total+=calcFixedCosts(y,m).total;   // 含固定成本
  return Math.round(total);
}

function renderSummary(y,m,lunchCnt,dinnerCnt){
  const el=document.getElementById('sch-summary');
  if(el) el.innerHTML='';   // 外送次數已移至上方統計列
}

function editRevenue(){
  const y=state.curYear,m=state.curMonth;
  const cur=getRevenue(y,m);
  const v=prompt(`${y}年${m}月 預估營業額`, cur);
  if(v===null) return;
  const n=parseInt(String(v).replace(/[^0-9]/g,''))||0;
  saveRevenue(y,m,n);
  renderSchedule();
}

function editStore(){
  const v=prompt('店別名稱（例如：旗艦店、二店）', getStore());
  if(v===null) return;
  save('mala_store', v.trim());
  renderSchedule();
}

function calcWorkHours(sh){
  if(!sh||sh.isOff) return 0;
  return Math.max(sh.hours-(sh.breakH||0),0);
}

function renderStatBar(y,m,emps,sch,shifts,holidays){
  const days=daysInMonth(y,m);
  let totalH=0,totalOT=0;
  const settings=getSettings();
  const reqH=calcRequiredHours(y,m);
  emps.forEach(emp=>{
    const empSch=sch[emp.id]||{};
    let empH=0, empDailyOT=0;
    for(let d=1;d<=days;d++){
      const code=empSch[d]||'';
      const sh=shifts[code];
      if(sh&&!sh.isOff&&code!=='國'){
        const h=calcWorkHours(sh);
        totalH+=h; empH+=h;
        empDailyOT+=Math.max(h-settings.regularHours,0);
      }
    }
    // 計時：每日超過正常工時為加班；正職：當月總時數超過應出勤為加班
    totalOT += emp.isFullTime ? Math.max(empH-reqH,0) : empDailyOT;
  });
  const rev=getRevenue(y,m);
  const cost=calcLaborCost(y,m);
  const pct=rev>0?(cost/rev*100):0;
  // 外送次數（午/晚/合計）
  const deliv=getDelivery(y,m);
  const lunch=Object.keys(deliv.lunch||{}).length, dinner=Object.keys(deliv.dinner||{}).length;
  // 正職人員當月休假天數（休/特/國/指）
  let ftRest=0;
  emps.filter(e=>e.isFullTime).forEach(e=>{
    const es=sch[e.id]||{};
    for(let d=1;d<=days;d++){ const c=es[d]||''; const s=shifts[c]; if((s&&s.isOff)||c==='國') ftRest++; }
  });
  document.getElementById('stat-bar').innerHTML=`
    <div class="stat-chip"><div class="sv">${emps.length}</div><div class="sl">員工數</div></div>
    <div class="stat-chip" style="cursor:pointer" onclick="editRevenue()"><div class="sv">$${(rev/10000).toFixed(0)}萬</div><div class="sl">預估營業額 ✎</div></div>
    <div class="stat-chip"><div class="sv" style="color:${pct>22?'#e74c3c':'#27ae60'}">${pct.toFixed(1)}%</div><div class="sl">人事成本 $${(cost/10000).toFixed(1)}萬</div></div>
    <div class="stat-chip"><div class="sv" style="color:#1d9e75">${lunch+dinner}</div><div class="sl">外送 午${lunch}晚${dinner}</div></div>

function lLeapMonth(y){ return LUNAR_INFO[y-1900]&0xf; }
function lLeapDays(y){ return lLeapMonth(y)?((LUNAR_INFO[y-1900]&0x10000)?30:29):0; }
function lMonthDays(y,m){ return (LUNAR_INFO[y-1900]&(0x10000>>m))?30:29; }
function lYearDays(y){ let s=348; for(let i=0x8000;i>0x8;i>>=1){s+=(LUNAR_INFO[y-1900]&i)?1:0;} return s+lLeapDays(y); }
function solarToLunar(y,m,d){
  let offset=Math.round((Date.UTC(y,m-1,d)-Date.UTC(1900,0,31))/86400000);
  let temp=0, ly;
  for(ly=1900; ly<2100&&offset>0; ly++){ temp=lYearDays(ly); offset-=temp; }
  if(offset<0){ offset+=temp; ly--; }
  const leap=lLeapMonth(ly); let isLeap=false, lm;
  for(lm=1; lm<13&&offset>0; lm++){
    if(leap>0&&lm===leap+1&&!isLeap){ lm--; isLeap=true; temp=lLeapDays(ly); }
    else { temp=lMonthDays(ly,lm); }
    if(isLeap&&lm===leap+1) isLeap=false;
    offset-=temp;
  }
  if(offset===0&&leap>0&&lm===leap+1){ if(isLeap){isLeap=false;}else{isLeap=true;lm--;} }
  if(offset<0){ offset+=temp; lm--; }
  return {lm, ld: offset+1};
}

  2026:{
    1:{1:'元旦'},
    2:{16:'除夕',17:'春節',18:'春節',19:'春節',20:'春節彈性放假',27:'和平紀念日補假',28:'和平紀念日'},
    4:{3:'兒童節補假',4:'兒童節',5:'清明節',6:'清明節補假'},

    12:{25:'行憲紀念日'},
  }
};
function holidayName(y,m,d){ return ((TW_HOLIDAY_NAMES[y]||{})[m]||{})[d]||''; }
function dayAnnotation(y,m,d,holidays,notes){
  if(notes[d]) return notes[d];                 // 自訂備註優先
  const hn=holidayName(y,m,d);                   // 國定假日名稱
  if(hn) return hn;
  if(holidays.includes(d)) return '休';          // 其他放假日（無名稱）
  if(d===daysInMonth(y,m)) return '月底盤點';     // 每月最後一天
  const L=solarToLunar(y,m,d);                   // 農曆做牙
  if(L.ld===2) return '初二';
  if(L.ld===16) return '十六';
  return '';
}

// ===== LEAVE & HOURS CALCULATIONS =====
function calcLeaveEntitlement(hireDateStr){
  if(!hireDateStr) return 0;
  const hire=new Date(hireDateStr), now=new Date();
  const days=(now-hire)/(24*60*60*1000);
  const months=days/30.44, years=days/365.25;
  if(months<6) return 0;
  if(months<12) return 3;
  if(years<2) return 7;
  if(years<3) return 10;
  if(years<5) return 14;
  if(years<10) return 15;
  return Math.min(15+Math.floor(years-10)+1, 30);
}

function calcLeaveUsed(empId, y){
  let used=0;
  for(let m=1;m<=12;m++){
    const sch=getSchedule(y,m);
    const empSch=sch[empId]||{};
    used+=Object.values(empSch).filter(c=>c==='特').length;
  }
  return used;
}

function calcRequiredHours(y,m){
  const days=daysInMonth(y,m);
  const holidays=getHolidays(y,m);
  let workDays=0;
  for(let d=1;d<=days;d++){
    const wk=weekday(y,m,d);
    if(wk!==0&&wk!==6&&!holidays.includes(d)) workDays++;
  }
  return workDays*8;
}

function calcSalary(empId, y, m){
  const emps=getEmployees();
  const emp=emps.find(e=>e.id===empId);
  if(!emp) return null;
  const sch=getSchedule(y,m);
  const shifts=getShifts();
  const settings=getSettings();
  const holidays=getHolidays(y,m);
  const empSch=sch[empId]||{};
  const days=daysInMonth(y,m);

  let workDays=0, restDays=0, totalH=0, regularPay=0, otPay=0, holPay=0;
  let ftRegHours=0, ftHolHours=0;   // 正職用：平日/假日工時累計
  const wage=emp.wage||0;

  for(let d=1;d<=days;d++){
    const code=empSch[d]||'';
    const sh=shifts[code];
    if(!sh) continue;
    if(sh.isOff){ restDays++; continue; }

    const isHol=holidays.includes(d);
    const h=calcWorkHours(sh);
    workDays++;
    totalH+=h;

    if(emp.isFullTime){
      // 月薪制：先累計工時，迴圈後一次計算
      if(isHol) ftHolHours+=h; else ftRegHours+=h;
    } else {
      // 計時制：逐日計算
      const regH=Math.min(h,settings.regularHours);
      const otH=Math.max(h-settings.regularHours,0);
      if(isHol){
        holPay+=h*wage*settings.holRate;
      } else {
        regularPay+=regH*wage;
        if(emp.otRate>0){
          otPay+=otH*emp.otRate;                         // 自訂加班費（元/時）
        } else {
          otPay+=Math.min(otH,2)*wage*settings.ot1 + Math.max(otH-2,0)*wage*settings.ot2;
        }
      }
    }
  }

  // 津貼／獎金（有上班的月份才計入）
  const allowances = workDays>0
    ? (emp.skillAllow||0)+(emp.attendBonus||0)+(emp.nightAllow||0)+(emp.mgrAllow||0)
    : 0;

  if(emp.isFullTime){
    // 月薪制：底薪固定；加班＝當月平日工時超過應出勤；假日另計
    const reqH=calcRequiredHours(y,m);
    const hourlyEquiv = emp.base>0 ? emp.base/reqH : wage;          // 月薪換算時薪
    const otH=Math.max(ftRegHours-reqH,0);
    const otHourly = emp.otRate>0 ? emp.otRate : hourlyEquiv*settings.ot1;
    regularPay = workDays>0 ? (emp.base||0) : 0;                    // 月薪底薪
    otPay = otH*otHourly;
    holPay = ftHolHours*hourlyEquiv*settings.holRate;
  } else {
    regularPay += (workDays>0?(emp.base||0):0);                     // 計時：時薪薪資＋底薪
  }
  const grossPay=Math.round(regularPay+otPay+holPay+allowances);
  const deductions=(emp.insurance||0)+(emp.dormitory||0);
  const netPay=grossPay-deductions;

  return {emp,workDays,restDays,totalH,regularPay,otPay,holPay,allowances,grossPay,deductions,netPay};
}

// ===== 固定成本 =====
function getFixedCost(){
  return {laborInsFT:0,laborInsPT:0,healthIns:0,groupIns:0,owner:0,groupRisk:0,accounting:7000,...load('mala_fixedcost',{})};
}
function editFixedCost(key,label){
  const f=getFixedCost();
  const v=prompt(`${label}（元/月）`, f[key]||0);
  if(v===null) return;
  f[key]=parseInt(String(v).replace(/[^0-9]/g,''))||0;
  save('mala_fixedcost',f);
  renderSalary();
}
// 當月固定成本明細（含自動計算項目）
function calcFixedCosts(y,m){
  const f=getFixedCost();
  const ftEmps=getEmployeesForMonth(y,m).filter(e=>e.isFullTime);
  const ftCount=ftEmps.length;
  // 三節禮金：當月有春節/端午/中秋 → 600 × 正職人數
  const names=Object.values(((typeof TW_HOLIDAY_NAMES!=='undefined'&&TW_HOLIDAY_NAMES[y])||{})[m]||{}).join('');
  const hasFestival=/春節|端午|中秋/.test(names);
  const festivalGift=hasFestival?600*ftCount:0;
  // 年終獎金攤提：正職(底薪+津貼)總和/12（每月都有）
  const ftMonthly=ftEmps.reduce((s,e)=>s+(e.base||0)+(e.skillAllow||0)+(e.attendBonus||0)+(e.nightAllow||0)+(e.mgrAllow||0),0);
  const yearEndAmort=Math.round(ftMonthly/12);
  const items=[
    {key:'laborInsFT', label:'勞保（正職）', val:f.laborInsFT, edit:true},
    {key:'laborInsPT', label:'勞保（計時）', val:f.laborInsPT, edit:true},
    {key:'healthIns',  label:'健保',        val:f.healthIns,  edit:true},
    {key:'groupIns',   label:'團保',        val:f.groupIns,   edit:true},
    {key:'owner',      label:'負責人',      val:f.owner,      edit:true},
    {key:'groupRisk',  label:'團險',        val:f.groupRisk,  edit:true},
    {key:'festival',   label:'三節禮金'+(hasFestival?`（600×${ftCount}）`:'（本月無）'), val:festivalGift, edit:false},
    {key:'yearEnd',    label:'年終獎金攤提（自動）', val:yearEndAmort, edit:false},
    {key:'accounting', label:'會計薪資',    val:f.accounting, edit:true},
  ];
  const total=items.reduce((s,i)=>s+i.val,0);
  return {items,total};
}

function renderSalary(){
  const y=state.salYear, m=state.salMonth;
  document.getElementById('sal-month-label').textContent=`${y} 年 ${m} 月`;
  const emps=getEmployeesForMonth(y,m);
  if(!emps.length){
    document.getElementById('salary-content').innerHTML='<div class="card" style="text-align:center;color:var(--gray);padding:24px">尚無員工資料</div>';
    return;
  }

  let totalGross=0, totalNet=0;
  let rows='';
  emps.forEach(emp=>{
    const r=calcSalary(emp.id,y,m);
    if(!r) return;
    totalGross+=r.grossPay;
    totalNet+=r.netPay;
    rows+=`
      <div class="sal-item">
        <div class="sal-name">${r.emp.name}</div>
        <div class="sal-tags">
          <span class="sal-tag">出勤 ${r.workDays} 天</span>
          <span class="sal-tag">時數 ${r.totalH.toFixed(1)}h</span>
          <span class="sal-tag">${r.emp.isFullTime?'月薪':'底薪'} $${r.regularPay.toFixed(0)}</span>
          ${r.otPay>0?`<span class="sal-tag" style="color:#e67e22">加班 $${r.otPay.toFixed(0)}</span>`:''}
          ${r.holPay>0?`<span class="sal-tag" style="color:#e74c3c">假日 $${r.holPay.toFixed(0)}</span>`:''}
          ${r.allowances>0?`<span class="sal-tag" style="color:#8e44ad">津貼 $${r.allowances.toFixed(0)}</span>`:''}
        </div>
        <div class="sal-total">實領 $${r.netPay.toLocaleString()}</div>
        ${r.deductions>0?`<div class="sal-deduct">扣除：保險 $${r.emp.insurance||0} ＋ 宿舍 $${r.emp.dormitory||0} = $${r.deductions}</div>`:''}
      </div>`;
  });

  // 固定成本
  const fc=calcFixedCosts(y,m);
  const fcRows=fc.items.map(it=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--text)">${it.label}</span>
      <span style="font-size:14px;font-weight:600;${it.edit?'cursor:pointer':''}" ${it.edit?`onclick="editFixedCost('${it.key}','${it.label}')"`:''}>$${it.val.toLocaleString()}${it.edit?' ✎':''}</span>
    </div>`).join('');
  const grandTotal=totalGross+fc.total;

  document.getElementById('salary-content').innerHTML=`
    <div class="card" style="background:var(--red);color:#fff;border-radius:12px;margin:12px">
      <div style="font-size:13px;opacity:.85;margin-bottom:4px">${y}年${m}月 人事成本總計</div>
      <div style="font-size:26px;font-weight:700">$${grandTotal.toLocaleString()}</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;opacity:.9">
        <span>員工薪資 $${totalGross.toLocaleString()}</span>
        <span>固定成本 $${fc.total.toLocaleString()}</span>
        <span>員工實領 $${totalNet.toLocaleString()}</span>
      </div>
    </div>
    <div class="section-title">員工薪資</div>
    <div class="card">${rows}</div>
    <div class="section-title">固定成本（每月）</div>
    <div class="card">
      ${fcRows}
      <div style="display:flex;justify-content:space-between;padding-top:10px;font-weight:700">
        <span>固定成本小計</span><span style="color:var(--red)">$${fc.total.toLocaleString()}</span>
      </div>
    </div>`;
}

function renderDayReqSettings(){
  const el=document.getElementById('day-req-card');
  if(!el) return;
  const req=getDayReq();
  const shifts=getShifts();
  const typeLabel={weekday:'平日（一～五）',saturday:'週六',sunday:'週日'};
  let html='';
  ['weekday','saturday','sunday'].forEach(dt=>{
    const rows=(req[dt]||[]).map(r=>{
      const badges=r.shifts.map(s=>{
        const sh=shifts[s]||{color:'#eee',textColor:'#333'};
        return `<span style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:700;background:${sh.color};color:${sh.textColor};margin-right:3px">${s}</span>`;

  });

}

function deleteShift(code){
  // 計算使用中的格數，提醒使用者
  let used=0;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && /^mala_sch_\d+_\d+$/.test(k)){
      const s=load(k,{});
      for(const eid in s) for(const d in s[eid]) if(s[eid][d]===code) used++;
    }
  }
  const warn = used>0 ? `\n\n⚠️ 目前有 ${used} 格排班使用此班別，刪除後那些格子會變空白。` : '';
  if(!confirm(`刪除班別「${code}」？${warn}`)) return;
  // 從自訂班別移除，並加入隱藏清單（連 DEFAULT 內建班別也能隱藏）
  const custom=load('mala_shifts',{});
  if(custom[code]){ delete custom[code]; save('mala_shifts',custom); }
  const hidden=load('mala_hidden_shifts',[]);
  if(!hidden.includes(code)){ hidden.push(code); save('mala_hidden_shifts',hidden); }
  renderSettings(); renderSchedule();
  showToast(`已刪除班別 ${code}`);
}

function openShiftDef(code){
  const shifts=getShifts();
  const sh=shifts[code]||{color:'#FFE066',textColor:'#333',hours:8,time:'',isOff:false,name:''};
  document.getElementById('shiftdef-title').textContent=code?`編輯班別 ${code}`:'新增班別';
  document.getElementById('sd-code').value=code;
  document.getElementById('sd-name').value=code;
  document.getElementById('sd-hours').value=sh.hours;
  document.getElementById('sd-time').value=sh.time;
  document.getElementById('sd-color').value=sh.color;
  document.getElementById('sd-textcolor').value=sh.textColor;
  document.getElementById('sd-isoff').checked=sh.isOff;
  openModal('shiftdef-overlay');
}

function saveShiftDef(){
  const code=document.getElementById('sd-code').value;
  const newCode=document.getElementById('sd-name').value.trim();
  if(!newCode){showToast('請輸入班別代碼');return;}
  const shifts=load('mala_shifts',{});
  if(code&&code!==newCode) delete shifts[code];
  shifts[newCode]={
    name:newCode+'班',
    time:document.getElementById('sd-time').value,
    hours:parseFloat(document.getElementById('sd-hours').value)||0,
    breakH:0,
    color:document.getElementById('sd-color').value,
    textColor:document.getElementById('sd-textcolor').value,
    isOff:document.getElementById('sd-isoff').checked,
  };
  saveShifts(shifts);
  // 若該代碼曾被刪除（隱藏），重新建立時取消隱藏
  const hidden=load('mala_hidden_shifts',[]).filter(c=>c!==newCode);
  save('mala_hidden_shifts',hidden);
  closeModal('shiftdef-overlay');
  renderSettings(); renderSchedule();
  showToast('班別已儲存');
}

// 以截圖方式輸出（瀏覽器繪製中文，避免 jsPDF 內建字型亂碼），A4 橫式滿版
async function imageToA4(node, filename){
  const cont=document.createElement('div');
  cont.style.cssText='position:absolute;left:-99999px;top:0;background:#fff;padding:16px;display:inline-block;text-align:center';
  cont.appendChild(node);
  document.body.appendChild(cont);
  // 截圖前把 sticky 欄位改為一般定位，避免 html2canvas 把員工欄推到右邊
  cont.querySelectorAll('.sticky-col').forEach(el=>{ el.style.position='static'; });
  const canvas=await html2canvas(cont,{scale:3,backgroundColor:'#fff',useCORS:true}); // 高解析度
  document.body.removeChild(cont);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4',compress:true});
  const pw=297, ph=210, iw=canvas.width, ih=canvas.height;
  const r=Math.min(pw/iw, ph/ih);          // 維持比例填滿頁面
  const w=iw*r, h=ih*r;
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',(pw-w)/2,(ph-h)/2,w,h); // PNG 文字清晰
  pdf.save(filename);
}

// 紅字天數：六、日＋國定假日
function countRedDays(y,m){
  const days=daysInMonth(y,m), hols=getHolidays(y,m);
  let cnt=0;
  for(let d=1;d<=days;d++){
    const wk=weekday(y,m,d);
    if(wk===0||wk===6||hols.includes(d)) cnt++;
  }
  return cnt;
}

function openAutoSchedule(){
  const y=state.curYear, m=state.curMonth;
  const emps=getEmployeesForMonth(y,m);
  if(!emps.length){ showToast('本月沒有員工'); return; }
  renderAutoScheduleModal(y,m);
  openModal('auto-overlay');
}

function renderAutoScheduleModal(y,m){
  const emps=getEmployeesForMonth(y,m);
  const days=daysInMonth(y,m);
  const holidays=getHolidays(y,m);
  const sch=getSchedule(y,m);
  const redDays=countRedDays(y,m);

  function empRow(emp){
    const empR=(getAutoRules().empRules||{})[emp.id]||{};
    const isWorkMode=empR.designatedWorkMode||false;
    const empSch=sch[emp.id]||{};
    // work-mode: pre-select days already marked with the emp's allowed shift
    // leave-mode: pre-select days already marked 指
    const preSel=[];
    const allowedShifts=empR.allowedShifts||['C'];
    for(let d=1;d<=days;d++){
      const c=empSch[d]||'';
      if(isWorkMode){ if(allowedShifts.includes(c)||c==='C') preSel.push(d); }
      else { if(c==='指') preSel.push(d); }
    }
    let dayBtns='';
    for(let d=1;d<=days;d++){
      const wk=weekday(y,m,d);
      const isRed=wk===0||wk===6||holidays.includes(d);
      const isSel=preSel.includes(d);
      const selColor=isWorkMode?'#27ae60':'#e74c3c';
      const cls='auto-day-btn'+(isRed&&!isWorkMode?' red-day':'')+(isSel?' selected':'');
      const bg=isSel?`background:${selColor};color:#fff;border-color:${selColor}`:'';
      dayBtns+=`<button class="${cls}" data-mode="${isWorkMode?'work':'leave'}"
        style="${bg}" onclick="toggleLeaveDay('${emp.id}',${d},this)">${d}</button>`;
    }
    const tag=emp.isFullTime
      ?`<span style="font-size:10px;color:#e67e22;margin-left:4px">正職</span>`
      :`<span style="font-size:10px;color:#3498db;margin-left:4px">計時</span>`;
    const hint=isWorkMode
      ?`<span style="font-size:11px;font-weight:600;color:#27ae60;margin-left:6px">點選上班的日期</span>`
      :`<span style="font-size:11px;font-weight:400;color:var(--gray);margin-left:6px">點選不能上班的日期</span>`;
    return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">

  document.getElementById('auto-modal-body').innerHTML=`

function runAutoSchedule(){
  const y=state.curYear, m=state.curMonth;
  const emps=getEmployeesForMonth(y,m);
  const rules=getAutoRules();
  const cannotWork={}, workDays={};
  emps.forEach(emp=>{
    const container=document.getElementById(`leaves-${emp.id}`);
    const isWorkMode=(rules.empRules||{})[emp.id]?.designatedWorkMode||false;
    const days=[];
    if(container) container.querySelectorAll('.auto-day-btn.selected').forEach(btn=>{
      days.push(parseInt(btn.textContent));
    });
    if(isWorkMode) workDays[emp.id]=days;
    else cannotWork[emp.id]=days;
  });
  const sch=getSchedule(y,m);
  const result=autoGenAlgo(y,m,{cannotWork,workDays});
  emps.forEach(emp=>{ sch[emp.id]=result[emp.id]||{}; });
  saveSchedule(y,m,sch);
  closeModal('auto-overlay');
  renderSchedule();
  showToast('✅ 班表已自動生成');
}

function autoGenAlgo(y,m,inputData){
  // inputData = { cannotWork:{empId:[days]}, workDays:{empId:[days]} }
  const days=daysInMonth(y,m);
  const holidays=getHolidays(y,m);
  const rules=getAutoRules();
  const dayReq=getDayReq();
  const emps=getEmployeesForMonth(y,m);
  const sch={};
  emps.forEach(e=>{ sch[e.id]={}; });

  const isOff=c=>!c||c==='休'||c==='指'||c==='特'||c==='國';
  const getDT=d=>{
    const wk=weekday(y,m,d);
    return wk===6?'saturday':wk===0?'sunday':'weekday';
  };

  // 計算週清單 (週日為起點)
  const firstWk=weekday(y,m,1);
  const weeks=[];
  for(let ws=1-firstWk;ws<=days;ws+=7){
    const wk=[];
    for(let d=ws;d<ws+7;d++){ if(d>=1&&d<=days) wk.push(d); }
    if(wk.length) weeks.push(wk);
  }

  // ── 步驟1：鎖定特殊員工 ──
  emps.forEach(emp=>{
    const empR=(rules.empRules||{})[emp.id]||{};

    // 不能上班日 → 指
    (inputData.cannotWork[emp.id]||[]).forEach(d=>{ sch[emp.id][d]='指'; });

    // 陳盈如型：平日固定班別＋六日國定休
    if(empR.weekdayShift&&empR.offWeekends){
      for(let d=1;d<=days;d++){
        if(sch[emp.id][d]) continue;
        const wk=weekday(y,m,d);
        if(wk===0||wk===6||holidays.includes(d)) sch[emp.id][d]='休';
        else sch[emp.id][d]=empR.weekdayShift;
      }
    }

    // 王鈺屏型：指定上班日=允許班別(第一個)，其餘休
    if(empR.designatedWorkMode){
      const shift=(empR.allowedShifts&&empR.allowedShifts.length)?empR.allowedShifts[0]:'C';
      for(let d=1;d<=days;d++){
        if(sch[emp.id][d]) continue;
        if((inputData.workDays[emp.id]||[]).includes(d)) sch[emp.id][d]=shift;
        else sch[emp.id][d]='休';
      }
    }
  });

  // 餘下員工（一般排班）
  const activeEmps=emps.filter(emp=>{
    const empR=(rules.empRules||{})[emp.id]||{};
    return !(empR.weekdayShift&&empR.offWeekends)&&!empR.designatedWorkMode;
  });

  // ── 步驟2：每週確保每人有 2 天休假，優先休「人力最充裕」的日子 ──
  weeks.forEach(week=>{
    // 計算各日「需求人數」（只算一般員工）
    const demand={};
    week.forEach(d=>{
      const dt=getDT(d);
      const tot=(dayReq[dt]||[]).reduce((s,r)=>s+r.count,0);
      // 已被特殊員工覆蓋的需求
      let covered=0;
      emps.filter(e=>!activeEmps.includes(e)).forEach(e=>{
        if(!isOff(sch[e.id][d])) covered++;
      });
      demand[d]=Math.max(0,tot-covered);
    });

    // 追蹤「確定上班」人數（隨休假分配更新）
    const committed={};
    week.forEach(d=>{ committed[d]=0; });

    // 優先處理「指定休最多」的員工（彈性最小）
    const sorted=[...activeEmps].sort((a,b)=>{
      const ar=week.filter(d=>isOff(sch[a.id][d])).length;
      const br=week.filter(d=>isOff(sch[b.id][d])).length;
      return br-ar;
    });

    sorted.forEach(emp=>{
      const existRest=week.filter(d=>isOff(sch[emp.id][d])).length;
      const need=Math.max(0,2-existRest);
      const avail=week.filter(d=>!sch[emp.id][d]);

      if(need===0){ avail.forEach(d=>committed[d]++); return; }

      // 選「surplus最大」的日子休假（surplus=committed - demand，越高越可以少一人）
      const score=d=>committed[d]-demand[d];
      const bySurplus=[...avail].sort((a,b)=>score(b)-score(a));
      const restSet=new Set(bySurplus.slice(0,need).map(d=>d));

      avail.forEach(d=>{
        if(restSet.has(d)) sch[emp.id][d]='休';
        else committed[d]++;
      });
    });
  });

  // ── 步驟3：依每日班別需求分配班別 ──
  for(let d=1;d<=days;d++){
    const dt=getDT(d);
    // 國定假日：一般員工標記「國」，不套用班別需求
    if(holidays.includes(d)){
      activeEmps.forEach(emp=>{ if(!sch[emp.id][d]) sch[emp.id][d]='國'; });
      continue;
    }

    const reqs=(dayReq[dt]||[]).map(r=>({...r,rem:r.count}));

    // 扣除特殊員工已覆蓋的需求
    emps.filter(e=>!activeEmps.includes(e)).forEach(e=>{
      const code=sch[e.id][d];
      if(!code||isOff(code)) return;
      for(const r of reqs){ if(r.shifts.includes(code)&&r.rem>0){r.rem--;break;} }
    });

    // 本日上班的一般員工
    const workers=activeEmps.filter(emp=>!isOff(sch[emp.id][d])&&!sch[emp.id][d]);
    const assigned=new Set();

    // 特異度低的需求（選擇少）先分配
    reqs.sort((a,b)=>a.shifts.length-b.shifts.length);

    for(const req of reqs){
      for(let i=0;i<req.rem;i++){
        // 找能排此班的員工
        let pick=workers.find(e=>{
          if(assigned.has(e.id)) return false;
          const allowed=(rules.empRules||{})[e.id]?.allowedShifts||[];
          return req.shifts.some(s=>allowed.includes(s));
        });
        // 找不到有允許班別的就隨機取一個未指派的
        if(!pick) pick=workers.find(e=>!assigned.has(e.id));
        if(!pick) break;
        const allowed=(rules.empRules||{})[pick.id]?.allowedShifts||[];
        sch[pick.id][d]=req.shifts.find(s=>allowed.includes(s))||req.shifts[0];
        assigned.add(pick.id);
      }
    }

    // 剩餘未指派但上班的員工 → 取允許班別第一個
    workers.forEach(emp=>{
      if(!assigned.has(emp.id)){
        const allowed=(rules.empRules||{})[emp.id]?.allowedShifts||[];
        sch[emp.id][d]=allowed[0]||'A';
        assigned.add(emp.id);
      }
    });
  }

  return sch;
}

// ===== AUTO-RULES SETTINGS =====
function renderAutoRulesSettings(){
  const all=getEmployees().filter(e=>e.active!==false);
  const el=document.getElementById('auto-rules-list');
  if(!el) return;
  if(!all.length){ el.innerHTML='<div style="color:var(--gray);font-size:13px;text-align:center;padding:12px">尚無員工</div>'; return; }

  const rules=getAutoRules();
  const shifts=getShifts();
  const workShifts=sortedShiftEntries(shifts).filter(([,sh])=>!sh.isOff);
  function empBlock(emp){
    const r=(rules.empRules||{})[emp.id]||{};
    const allowed=r.allowedShifts||[];
    const shiftBtns=workShifts.map(([code,sh])=>{
      const active=allowed.includes(code);
      return `<button onclick="toggleAllowedShift('${emp.id}','${code}',this)"
        style="padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;
               border:2px solid ${active?'var(--red)':'var(--border)'};
               background:${sh.color};color:${sh.textColor}">${code}</button>`;
    }).join('');

    let extra='';
    if(emp.isFullTime){
      const weekdayShift=r.weekdayShift||'';
      const offWeekends=r.offWeekends||false;
      const wdOpts=`<option value="">-- 依允許班別輪排 --</option>`+
        workShifts.map(([code])=>`<option value="${code}" ${weekdayShift===code?'selected':''}>${code}</option>`).join('');
      const designatedWorkMode=r.designatedWorkMode||false;
      extra=`
        <div class="form-group" style="margin-bottom:8px">
          <label><input type="checkbox" onchange="saveEmpAutoRule('${emp.id}','designatedWorkMode',this.checked)"
            ${designatedWorkMode?'checked':''} style="width:auto;margin-right:6px">指定上班模式（每月輸入她的上班日，固定排允許班別，不套用一般規則）</label>
        </div>`+(!designatedWorkMode?`
        <div class="form-group" style="margin-bottom:8px">
          <label>平日固定班別<span style="font-size:11px;color:var(--gray);margin-left:4px">（留空則從允許班別輪排）</span></label>
          <select onchange="saveEmpAutoRule('${emp.id}','weekdayShift',this.value)"
            style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;width:100%">${wdOpts}</select>
        </div>
        <div class="form-group" style="margin-bottom:8px">
          <label><input type="checkbox" onchange="saveEmpAutoRule('${emp.id}','offWeekends',this.checked)"
            ${offWeekends?'checked':''} style="width:auto;margin-right:6px">特殊規則：六、日及國定假日一律排休</label>
        </div>`:'');
    }

    return `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">
        ${emp.name}
        <span style="font-size:11px;font-weight:400;margin-left:6px;color:${emp.isFullTime?'#e67e22':'#3498db'}">${emp.isFullTime?'正職':'計時'}</span>
      </div>
      ${extra}
      <div class="form-group" style="margin-bottom:0">
        <label>允許班別</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${shiftBtns}</div>
      </div>
    </div>`;
  }

  const ft=all.filter(e=>e.isFullTime), pt=all.filter(e=>!e.isFullTime);
  let html='';
  if(ft.length) html+=`<div style="font-size:11px;font-weight:700;color:#c0392b;padding:8px 0 2px">正職人員</div>`+ft.map(empBlock).join('');
  if(pt.length) html+=`<div style="font-size:11px;font-weight:700;color:#1f6aa5;padding:14px 0 2px">計時人員</div>`+pt.map(empBlock).join('');
  el.innerHTML=html;
}


function toggleAllowedShift(empId,code,btn){
  const rules=getAutoRules();
  if(!rules.empRules) rules.empRules={};
  if(!rules.empRules[empId]) rules.empRules[empId]={};
  let allowed=rules.empRules[empId].allowedShifts||[];
  if(allowed.includes(code)){
    allowed=allowed.filter(c=>c!==code);
    btn.style.border='2px solid var(--border)';
  } else {
    allowed.push(code);
    btn.style.border='2px solid var(--red)';
  }
  rules.empRules[empId].allowedShifts=allowed;
  saveAutoRules(rules);
}

function saveEmpAutoRule(empId,key,value){
  const rules=getAutoRules();
  if(!rules.empRules) rules.empRules={};
  if(!rules.empRules[empId]) rules.empRules[empId]={};
  rules.empRules[empId][key]=value;
  saveAutoRules(rules);
}

// ===== TAIWAN OFFICIAL HOLIDAYS =====
// 放假日陣列由 TW_HOLIDAY_NAMES 自動產生（單一來源，避免名稱與日期不一致）
const TW_HOLIDAYS = {};
for(const yy in TW_HOLIDAY_NAMES){
  TW_HOLIDAYS[yy]={};
  for(const mm in TW_HOLIDAY_NAMES[yy]){
    TW_HOLIDAYS[yy][mm]=Object.keys(TW_HOLIDAY_NAMES[yy][mm]).map(Number);
  }
}

// 行事曆版本：修正後 bump 此值，會強制各裝置以官方行事曆重新覆蓋本機放假日
const HOLIDAY_VERSION='2026.2';

function seedHolidays(){
  _suppressPush=true;
  const force = localStorage.getItem('mala_hol_ver')!==HOLIDAY_VERSION;
  if(force){
    // 清除舊版自動帶入的放假日，避免失效補假殘留（如舊版 6/22、3/2）
    const del=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k && /^mala_hol_\d+_\d+$/.test(k)) del.push(k);
    }
    del.forEach(k=>localStorage.removeItem(k));
  }
  for(const yy in TW_HOLIDAYS){
    for(const mm in TW_HOLIDAYS[yy]){
      const key=`mala_hol_${yy}_${mm}`;
      if(force || !load(key,[]).length){
        localStorage.setItem(key, JSON.stringify(TW_HOLIDAYS[yy][mm]));
      }
    }
  }
  localStorage.setItem('mala_hol_ver', HOLIDAY_VERSION);
  _suppressPush=false;
}

// 安全網：本機若殘留舊班別碼 H，改為 H1（雲端已另行遷移，本機不推送）
function migrateShiftCodes(){
  _suppressPush=true;
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && /^mala_sch_\d+_\d+$/.test(k)){
      const s=load(k,{}); let mod=false;
      for(const eid in s){ for(const d in s[eid]){ if(s[eid][d]==='H'){ s[eid][d]='H1'; mod=true; } } }
      if(mod) localStorage.setItem(k, JSON.stringify(s));
    }
  }
  _suppressPush=false;
}

// ===== INIT (cloud-first, never clobbers the cloud with demo/empty data) =====
(async function init(){
  // 1) capture setup config from URL hash: #gist=ID&token=TOKEN
  const hash=location.hash.slice(1);
  if(hash.includes('gist=')){
    const p=new URLSearchParams(hash);
    const gistId=p.get('gist'), token=p.get('token');
    if(gistId&&token){ saveGistCfg({gistId,token}); history.replaceState(null,'',location.pathname); }
  }
  const cfg=getGistCfg();
  // 2) if connected, pull the cloud copy FIRST and start polling
  if(cfg){
    await pullFromGist(false);
    startGistPolling();
  }
  // 3) only seed demo data for a brand-new standalone user (no cloud, no data)
  if(!cfg && !getEmployees().length){ loadDemoData(); }
  // 4) fill in default holidays for months the cloud didn't define (no push)
  seedHolidays();
  // 4b) 安全網：本機殘留的舊 H 班碼改為 H1
  migrateShiftCodes();
  // 5) render
  renderSchedule();
})();
